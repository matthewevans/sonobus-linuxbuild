name: Build and Publish SonoBus

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'SonoBus branch to build'
        default: 'main'
      iteration:
        description: 'Package iteration (e.g. 0, 1)'
        default: '0'
      publish:
        description: 'Publish to apt repo'
        default: 'false'
        type: choice
        options: ['true', 'false']

  push:
    tags: ['v*']

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.distro }}/${{ matrix.arch }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { distro: debian, arch: amd64, platform: linux/amd64,  runs_on: ubuntu-latest,    base_image: ubuntu:jammy         }
          - { distro: debian, arch: arm64, platform: linux/arm64,  runs_on: ubuntu-24.04-arm, base_image: ubuntu:jammy         }
          - { distro: debian, arch: i386,  platform: linux/386,    runs_on: ubuntu-latest,    base_image: "i386/ubuntu:bionic" }
          - { distro: debian, arch: armhf, platform: linux/arm/v7, runs_on: ubuntu-latest,    base_image: arm32v7/ubuntu:jammy }

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.arch != 'amd64' && matrix.arch != 'arm64'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve upstream SHA (for cache invalidation)
        id: sha
        env:
          BRANCH: ${{ inputs.branch || 'main' }}
        run: |
          SHA=$(git ls-remote https://github.com/sonosaurus/sonobus.git "refs/heads/${BRANCH}" | cut -f1)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and export package
        uses: docker/build-push-action@v6
        with:
          file: docker/Dockerfile.${{ matrix.distro == 'debian' && 'deb' || 'rpm' }}
          context: docker
          platforms: ${{ matrix.platform }}
          target: export
          outputs: type=local,dest=output
          build-args: |
            BASE_IMAGE=${{ matrix.base_image }}
            BRANCH=${{ inputs.branch || 'main' }}
            SONOBUS_SHA=${{ steps.sha.outputs.sha }}
            ARCH=${{ matrix.arch }}
            ITERATION=${{ inputs.iteration || '0' }}
          cache-from: type=gha,scope=${{ matrix.distro }}-${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.distro }}-${{ matrix.arch }},mode=max

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ matrix.distro }}-${{ matrix.arch }}
          path: output/*.deb
          retention-days: 30

  publish:
    name: Publish apt repo
    needs: build
    runs-on: ubuntu-latest
    if: >-
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == 'true')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: output
          pattern: pkg-*
          merge-multiple: true

      - name: Install dpkg-dev
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Import GPG key
        if: env.HAS_GPG == 'true'
        env:
          HAS_GPG: ${{ secrets.GPG_PRIVATE_KEY != '' }}
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "APT_GPG_KEY=${{ secrets.GPG_KEY_ID }}" >> "$GITHUB_ENV"

      - name: Clone packages repo
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.PACKAGES_DEPLOY_TOKEN }}@github.com/sonosaurus/sonobus-packages.git" \
            packages-repo
          git -C packages-repo config user.name "github-actions[bot]"
          git -C packages-repo config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update and push repository
        run: ./scripts/update-repo.sh --repo-dir packages-repo --push
